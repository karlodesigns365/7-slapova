<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staza sedam slapova</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; background: #f4f7f6; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .gps-marker {
            width: 14px; height: 14px; background: #007AFF;
            border: 3px solid white; border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,122,255,0.6);
        }

        .locate-button {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; width: 55px; height: 55px; border-radius: 18px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 28px; border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* GUMB PUT - Smješten dolje desno, prilagođen ekranu */
        /* Pronađi .route-toggle (ili dodaj ako nemaš) i zamijeni ovim: */
		.route-toggle {
		position: absolute; 
		bottom: 30px; /* Paralelno s legendom */
		right: 20px; 
		z-index: 1100; 
		background: white; 
		width: 55px; 
		height: 55px; 
		border-radius: 18px;
		display: flex; 
		justify-content: center; 
		align-items: center;
		cursor: pointer; 
		font-size: 28px; 
		border: none;
		box-shadow: 0 4px 20px rgba(0,0,0,0.2);
		transition: 0.3s;
		}

		.route-toggle.active { 
		background: #007AFF; 
		color: white; 
		}
	
		/* Obavezno dodaj ovo da sakriješ bijeli prozor s uputama koji kvari izgled */
		.leaflet-routing-container { display: none !important; }

        .radar-button {
            position: absolute; top: 70px; left: 12px; z-index: 1000;
            background: white; width: 44px; height: 44px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 24px; border: 2px solid rgba(0,0,0,0.2);
            box-shadow: 0 1px 5px rgba(0,0,0,0.4); transition: 0.3s;
        }

        .weather-button {
            position: absolute; top: 125px; left: 12px; z-index: 1000;
            background: white; width: 44px; height: 44px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 24px; border: 2px solid rgba(0,0,0,0.2);
            box-shadow: 0 1px 5px rgba(0,0,0,0.4); transition: 0.3s;
        }

        .radar-button.active { background: #e3f2fd; border: 2px solid #007AFF; color: #007AFF; }

        #weather-panel {
            position: absolute; top: 70px; left: 65px; z-index: 1001;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 18px; width: 180px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            display: none; border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .w-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; color: #1d1d1f; font-weight: 500; font-size: 14px; }
        .w-val { margin-left: auto; font-weight: 700; color: #007AFF; }

        .legend-container {
            position: absolute; bottom: 30px; left: 20px; z-index: 1100;
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px);
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 230px; border: 1px solid rgba(0,0,0,0.05);
        }
        .legend-header { padding: 18px; cursor: pointer; font-weight: 800; display: flex; justify-content: space-between; align-items: center; color: #1d1d1f; }
        .legend-content { padding: 0 18px 18px 18px; display: none; font-size: 14px; }
        .legend-container.active .legend-content { display: block; }
        .leg-item { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; color: #333; font-weight: 500; }

        #distance-toast {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9); color: white; padding: 14px 28px;
            border-radius: 40px; font-weight: 600; font-size: 15px;
            z-index: 2000; opacity: 0; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; text-align: center; min-width: 180px;
        }
        #distance-toast.show { opacity: 1; bottom: 145px; }

        .poi-icon { font-size: 30px; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3)); cursor: pointer; text-align: center; }
        .leaflet-popup-content-wrapper { border-radius: 16px; padding: 8px; box-shadow: 0 5px 25px rgba(0,0,0,0.15); }
        .blue-title { color: #007AFF; font-size: 18px; font-weight: 800; display: block; margin-bottom: 6px; }
		.popup-img {
    width: 100%;
    height: auto;
    border-radius: 12px;
    margin-top: 8px;
    display: block;
}
        
        /* Skrivanje kontrola rute s ekrana */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>
    <button class="locate-button" onclick="centerToUser()">🎯</button>
    <button id="route-btn" class="route-toggle" onclick="toggleRoute()">🚘</button>
    <button id="radar-btn" class="radar-button" onclick="toggleRadar()">☁️</button>
    
    <button class="weather-button" onclick="toggleWeather()">☀️</button>
    <div id="weather-panel">
        <div class="w-row">🌡️ Temp: <span id="w-temp" class="w-val">--</span></div>
        <div class="w-row">💨 Vjetar: <span id="w-wind" class="w-val">--</span></div>
        <div class="w-row">💧 Vlaga: <span id="w-hum" class="w-val">--</span></div>
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 10px 0;">
        <div class="w-row">🌞 Izlazak: <span id="w-sunr" class="w-val">--</span></div>
        <div class="w-row">🌞 Zalazak: <span id="w-suns" class="w-val">--</span></div>
    </div>
    
    <div id="distance-toast">Udaljenost: --</div>

    <div class="legend-container" id="legend">
        <div class="legend-header" onclick="toggleLegend()">
            <span>Vodič stazom</span>
            <span id="arr">▲</span>
        </div>
        <div class="legend-content">
            <div class="leg-item"><span>💧</span> Mali slap</div>
            <div class="leg-item"><span>💦</span> Slap</div>
            <div class="leg-item"><span>⛰️</span> Vrh</div>
            <div class="leg-item"><span>↔️</span> Prijelaz / Most</div>
            <div class="leg-item"><span>🪵</span> Odmorište</div>
            <div class="leg-item"><span>🍴</span> Restoran</div>
            <div class="leg-item"><span>⛪</span> Sakralna građevina</div>
            <div class="leg-item"><span>🅿️</span> Parking</div>
            <div class="leg-item"><span>🚾</span> WC</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    
    <script>
        AOS.init();

        function toggleLegend() { 
            const leg = document.getElementById('legend');
            leg.classList.toggle('active');
            document.getElementById('arr').innerText = leg.classList.contains('active') ? '▼' : '▲';
        }

        var map = L.map('map', {
            rotate: true, touchRotate: true, zoomControl: false, maxZoom: 22,
            closePopupOnClick: true 
        }).setView([45.38, 13.99], 14);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 22, maxNativeZoom: 19
        }).addTo(map);

        var radarLayers = [];
        var stazaLine = null; 
        var radarInterval = null;
        var currentFrame = 0;
        var routingControl = null;

        // Funkcija za put (toggle)
        function toggleRoute() {
            const btn = document.getElementById('route-btn');
            if (routingControl) {
                map.removeControl(routingControl);
                routingControl = null;
                btn.classList.remove('active');
            } else {
                if (!userLatLng) {
                    showToast("GPS lokacija nije pronađena");
                    return;
                }
                btn.classList.add('active');
                // Cilj je parking na početku staze
                routingControl = L.Routing.control({
                    waypoints: [
                        L.latLng(userLatLng.lat, userLatLng.lng),
                        L.latLng(45.4010, 13.9622) // Koordinate parkinga/početka
                    ],
                    routeWhileDragging: false,
                    addWaypoints: false,
                    createMarker: function() { return null; }, // Ne stvara nove markere da ne kvari tvoj plavi
                    lineOptions: { styles: [{color: '#007AFF', weight: 6, opacity: 0.8}] }
                }).addTo(map);
            }
        }

        function stopRadar() {
            if (radarInterval) clearTimeout(radarInterval);
            radarLayers.forEach(layer => map.removeLayer(layer));
            radarLayers = [];
            currentFrame = 0;
            document.getElementById('radar-btn').classList.remove('active');
        }

        function runAnimation() {
            let nextFrame = (currentFrame + 1) % radarLayers.length;
            radarLayers[nextFrame].setOpacity(0.6); 
            radarLayers.forEach((layer, index) => {
                if (index !== nextFrame) layer.setOpacity(0);
            });
            currentFrame = nextFrame;
            let delay = (currentFrame === radarLayers.length - 1) ? 2000 : 800;
            radarInterval = setTimeout(runAnimation, delay);
        }

        function toggleRadar() {
            const btn = document.getElementById('radar-btn');
            if (radarLayers.length > 0) {
                stopRadar();
            } else {
                fetch('https://api.rainviewer.com/public/weather-maps.json')
                    .then(res => res.json())
                    .then(data => {
                        const frames = data.radar.past.slice(-3);
                        frames.forEach(frame => {
                            let layer = L.tileLayer(`https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`, {
                                opacity: 0, zIndex: 500, maxNativeZoom: 15
                            });
                            radarLayers.push(layer);
                            layer.addTo(map);
                        });
                        btn.classList.add('active');
                        map.flyTo([45.2, 14.2], 7, { duration: 1.5 }); 
                        runAnimation();
                    });
            }
        }

        function toggleWeather() {
            const panel = document.getElementById('weather-panel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
            } else {
                panel.style.display = 'block';
                fetchWeatherData(); 
            }
        }

        function fetchWeatherData() {
            const apiKey = "8118a7763551be78" + "1a6941219868cd0d";
            fetch(`https://api.openweathermap.org/data/2.5/weather?lat=45.40&lon=13.96&appid=${apiKey}&units=metric&lang=hr`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('w-temp').innerText = Math.round(data.main.temp) + "°C";
                    let windKmH = (data.wind.speed * 3.6).toFixed(1);
                    document.getElementById('w-wind').innerText = windKmH + " km/h";
                    document.getElementById('w-hum').innerText = data.main.humidity + "%";
                    const formatTime = (ts) => {
                        let d = new Date(ts * 1000);
                        return d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
                    };
                    document.getElementById('w-sunr').innerText = formatTime(data.sys.sunrise);
                    document.getElementById('w-suns').innerText = formatTime(data.sys.sunset);
                })
                .catch(e => {
                    showToast("Greška pri dohvatu vremena");
                });
        }

        var userLatLng = null;

        function showToast(text) {
            const toast = document.getElementById('distance-toast');
            toast.innerText = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        function calculateDistance(targetLatLng) {
            if (!userLatLng) return "GPS nedostupan";
            if (!stazaLine || stazaLine.length === 0) {
                let d = userLatLng.distanceTo(targetLatLng);
                return d > 999 ? (d / 1000).toFixed(1) + " km" : Math.round(d) + " m";
            }
            function toL(coord) { return L.latLng(coord[1], coord[0]); }
            let uIdx = 0, tIdx = 0, minDistU = Infinity, minDistT = Infinity;
            stazaLine.forEach((coord, i) => {
                let p = toL(coord);
                let dU = p.distanceTo(userLatLng), dT = p.distanceTo(targetLatLng);
                if (dU < minDistU) { minDistU = dU; uIdx = i; }
                if (dT < minDistT) { minDistT = dT; tIdx = i; }
            });
            if (minDistU > 500) {
                let d = userLatLng.distanceTo(targetLatLng);
                return d > 999 ? (d / 1000).toFixed(1) + " km" : Math.round(d) + " m";
            }
            let total = 0, start = Math.min(uIdx, tIdx), end = Math.max(uIdx, tIdx);
            for (let i = start; i < end; i++) total += toL(stazaLine[i]).distanceTo(toL(stazaLine[i+1]));
            total += minDistU;
            return total > 999 ? (total / 1000).toFixed(1) + " km" : Math.round(total) + " m";
        }

        fetch('tocke.geojson').then(res => res.json()).then(data => {
            L.geoJSON(data, {
                pointToLayer: function(feature, latlng) {
                    let p = feature.properties;
                    let n = (p.naziv || p.name || "").toLowerCase();
                    let emoji = "📍";
                    if (n.includes("mali slap")) emoji = "💧";
                    else if (n.includes("slap")) emoji = "💦";
                    else if (n.includes("vrh")) emoji = "⛰️";
                    else if (n.includes("prijelaz") || n.includes("most")) emoji = "↔️";
                    else if (n.includes("restoran")) emoji = "🍴";
                    else if (n.includes("odmorište")) emoji = "🪵";
                    else if (n.includes("sakraln") || n.includes("crkva")) emoji = "⛪";
                    else if (n.includes("parking")) emoji = "🅿️";
                    else if (n.includes("wc")) emoji = "🚾";

                    let marker = L.marker(latlng, {
                        icon: L.divIcon({ className: 'poi-icon', html: emoji, iconSize: [36, 36], iconAnchor: [18, 18] })
                    });

marker.on('click', function(e) {
    let dist = calculateDistance(latlng);
    showToast(`Udaljenost: ${dist}`);
    
    let title = p.ime || p.naziv || p.name || "";
    let desc = p.opis || "";
    let nLower = title.toLowerCase();
    
    // Logika za slike
    let imgFile = "";
    if (nLower.includes("bačva")) imgFile = "bačva.png";
    else if (nLower.includes("grjok")) imgFile = "grjok.png";
    else if (nLower.includes("kotli")) imgFile = "kotli.png";
    else if (nLower.includes("mala peć")) imgFile = "mala peć.png";
    else if (nLower.includes("vela peć")) imgFile = "vela peć.png";
    else if (nLower.includes("zagon")) imgFile = "zagon.png";
    else if (nLower.includes("zelenščak")) imgFile = "zelenščak.png";

    let imgHtml = imgFile ? `<img src="${imgFile}" class="popup-img" onerror="this.style.display='none'">` : "";
    let content = "";

    // 1. Slapovi i Vrhovi (Naslov + Opis + Slika)
    if (nLower.includes("slap") || nLower.includes("vrh")) {
        content = `<span class="blue-title">${title}</span><p>${desc}</p>${imgHtml}`;
    } 
    // 2. Restorani i Kotli (Naslov + Opis)
    else if (nLower.includes("restoran") || nLower.includes("konoba") || nLower.includes("kotli")) {
        content = `<span class="blue-title">${title}</span><p>${desc}</p>`;
    }
    // 3. Odmorišta (Samo Naslov)
    else if (nLower.includes("odmorište") && title.length > 10) {
        content = `<span class="blue-title">${title}</span>`;
    }

    if (content) {
        L.popup({ autoClose: true, offset: [0, -10], maxWidth: 250 })
         .setLatLng(latlng)
         .setContent(content)
         .openOn(map);
    }
});            return marker;
                }
            }).addTo(map);
        });

        fetch('staza.geojson').then(res => res.json()).then(data => {
            stazaLine = data.features[0].geometry.coordinates;
            L.geoJSON(data, { 
                style: { color: "#000000", weight: 5, opacity: 0.5, dashArray: '8, 8' }, 
                interactive: false 
            }).addTo(map);
        });

        var userMarker, hasCentered = false;
        map.locate({watch: true, enableHighAccuracy: true});
        map.on('locationfound', function(e) {
            userLatLng = e.latlng;
            // Prvi put leti na lokaciju
            if (!hasCentered) { 
                map.flyTo(e.latlng, 17); 
                hasCentered = true; 
            }
            // Zadržavamo tvoj plavi marker s bijelim rubom
            if (!userMarker) {
                userMarker = L.marker(e.latlng, { 
                    icon: L.divIcon({ className: '', html: "<div class='gps-marker'></div>", iconSize: [14, 14], iconAnchor: [7, 7] }), 
                    zIndexOffset: 1000 
                }).addTo(map);
            } else { 
                userMarker.setLatLng(e.latlng); 
            }
        });

        function centerToUser() {
            stopRadar();
            if (userLatLng) map.flyTo(userLatLng, 19, { duration: 1.2 });
        }
		function toggleRoute() {
    const btn = document.getElementById('route-btn');
    
    // Ako je ruta već prikazana, obriši je
    if (routingControl) {
        map.removeControl(routingControl);
        routingControl = null;
        btn.classList.remove('active');
        return;
    }

    // Provjera imamo li GPS lokaciju korisnika
    if (!userLatLng) {
        showToast("GPS lokacija nije pronađena");
        return;
    }

    btn.classList.add('active');

    // LOKACIJA: Parking kod Istarskog vodovoda, Buzet (Početak staze)
    const parkingBuzet = L.latLng(45.3999, 13.9856);

    routingControl = L.Routing.control({
        waypoints: [
            L.latLng(userLatLng.lat, userLatLng.lng),
            parkingBuzet
        ],
        router: L.Routing.osrmv1({
            serviceUrl: `https://router.project-osrm.org/route/v1`
        }),
        show: false,
        addWaypoints: false,
        draggableWaypoints: false,
        createMarker: function() { return null; }, 
        lineOptions: {
            styles: [{color: '#007AFF', weight: 7, opacity: 0.7}]
        }
    }).addTo(map);

    routingControl.on('routesfound', function(e) {
        var routes = e.routes;
        var bounds = L.latLngBounds(routes[0].coordinates);
        map.fitBounds(bounds, {padding: [50, 50]});
    });
}
    </script>
</body>
</html>
